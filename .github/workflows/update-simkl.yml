name: update-simkl

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & format Simkl stats
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, urllib.request

          client_id = os.environ.get("SIMKL_CLIENT_ID")
          user_id = "2218813"
          stats_md = ""

          if not client_id:
              stats_md = "*Set `SIMKL_CLIENT_ID` secret to show Simkl stats.*"
          else:
              try:
                  # 1. Fetch Stats
                  url_stats = f"https://api.simkl.com/users/{user_id}/stats?client_id={client_id}"
                  req_stats = urllib.request.Request(url_stats)
                  req_stats.add_header("Accept", "application/json")
                  resp_stats = urllib.request.urlopen(req_stats, timeout=15)
                  d = json.loads(resp_stats.read())

                  total_mins = d.get("total_mins", 0)
                  h, m = divmod(total_mins, 60)
                  lines = []

                  # 2. Fetch Last Completed
                  last_items = []
                  for cat in ["movies", "tv", "anime"]:
                      try:
                          url_cat = f"https://api.simkl.com/users/{user_id}/watchlist/{cat}/completed?client_id={client_id}&extended=full"
                          req_cat = urllib.request.Request(url_cat)
                          req_cat.add_header("Accept", "application/json")
                          resp_cat = urllib.request.urlopen(req_cat, timeout=15)
                          watchlist = json.loads(resp_cat.read())
                          if watchlist:
                              latest = max(watchlist, key=lambda x: x.get("last_watched_at") or "")
                              last_items.append(latest)
                      except:
                          continue
                  
                  if last_items:
                      latest_overall = max(last_items, key=lambda x: x.get("last_watched_at") or "")
                      item = latest_overall.get("movie") or latest_overall.get("show")
                      if item:
                          title = item.get("title")
                          rating = item.get("ratings", {}).get("simkl", {}).get("rating")
                          
                          lines.append(f"**Name:** {title}")
                          
                          if rating:
                              rating_val = int(round(float(rating)))
                              stars = "⭐" * rating_val
                              lines.append(f"**Rating:** {stars} (out of 10 / {rating_val} stars)")

                  stats_md = "<br>".join(lines)

              except Exception as e:
                  stats_md = f"Simkl stats unavailable (error: {e})"

          readme_path = "README.md"
          with open(readme_path) as f:
              content = f.read()

          new_block = f"<!--START_SIMKL-->\n{stats_md}\n<!--END_SIMKL-->"

          if "<!--START_SIMKL-->" in content:
              content = re.sub(
                  r"<!--START_SIMKL-->.*?<!--END_SIMKL-->",
                  new_block,
                  content,
                  flags=re.DOTALL,
              )
          else:
              content += f"\n\n\n{new_block}\n"

          with open(readme_path, "w") as f:
              f.write(content)

          print("README updated with Simkl stats")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "Update Simkl stats" && git pull --rebase origin main && git push)
