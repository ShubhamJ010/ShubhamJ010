name: update-github-stats

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: readmefetch

      - name: Generate neofetch stats
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: bun run readmefetch/main.ts

      - name: Commit and push changes
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md -f out/fetch.png
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update GitHub stats" && \
             git push "https://x-access-token:${{ secrets.GH_STATS_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }})
